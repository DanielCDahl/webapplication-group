<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fake Store - Order Form</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="../Store/index.html">Fake Store</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../Store/index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="../Products/products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="../About/about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="order.html">Order Form</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="mb-4 text-center">Order Form</h1>
            <p class="text-muted text-center mb-4">
                Please fill in your details to place your order.
            </p>
            <div id="selectedProductCard" class="mb-4 d-none">
              <div class="card">
                <div class="card-body">
                  <h2 class="h5">Selected product</h2>
                  <p id="selectedProductTitle" class="mb-1 fw-bold"></p>
                  <p id="selectedProductPrice" class="mb-0"></p>
                </div>
              </div>
            </div>

            <form id="orderForm" novalidate>
              <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" id="name" class="form-control" maxlength="50" placeholder="Name" />
                <div class="error-message text-danger mt-1" id="nameError"></div>
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="text" id="email" class="form-control" maxlength="50" placeholder="name@example.com"/>
                <div class="error-message text-danger mt-1" id="emailError"></div>
              </div>

              <div class="mb-3">
                <label for="phone" class="form-label">Phone</label>
                <input type="text" id="phone" class="form-control" maxlength="20" placeholder="Example: 070-1234567"/>
                <div class="error-message text-danger mt-1" id="phoneError"></div>
              </div>

              <div class="mb-3">
                <label for="street" class="form-label">Street address</label>
                <input type="text" id="street" class="form-control" maxlength="50" placeholder="Address"/>
                <div class="error-message text-danger mt-1" id="streetError"></div>
              </div>

              <div class="row">
                <div class="col-12 col-sm-4 mb-3">
                  <label for="postcode" class="form-label">Post code</label>
                  <input type="text" id="postcode" class="form-control" maxlength="5" placeholder="12345"/>
                  <div class="error-message text-danger mt-1" id="postcodeError"></div>
                </div>

                <div class="col-12 col-sm-8 mb-3">
                  <label for="city" class="form-label">City</label>
                  <input type="text" id="city" class="form-control" maxlength="20" placeholder="City"/>
                  <div class="error-message text-danger mt-1" id="cityError"></div>
                </div>
              </div>

              <div class="error-message text-danger mt-1" id="productError"></div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Place Order
                                </button>
                            </div>

                            <div id="successMessage" class="alert alert-success mt-4 d-none">
                                Order submitted successfully!
                            </div>

        </div>
      </div>
    </div>
  </main>

  <script src="js/order.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
