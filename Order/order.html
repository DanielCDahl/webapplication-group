<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fake Store - Order Form</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/webapplication-group/index.html">Fake Store</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/webapplication-group/index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/webapplication-group/Products/products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="/webapplication-group/About/about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="order.html">Order Form</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <h1 class="text-center mb-4">Order Form</h1>

    <div id="productError" class="alert alert-danger d-none"></div>

    <div id="selectedProductCard" class="card mb-4 d-none">
      <div class="card-body">
        <h2 class="h5">Selected Product</h2>
        <p id="selectedProductTitle" class="mb-1 fw-bold"></p>
        <p id="selectedProductPrice" class="mb-0"></p>
      </div>
    </div>

    <form id="orderForm" novalidate>
      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input id="name" type="text" class="form-control" placeholder="Name" />
        <div id="nameError" class="text-danger mt-1"></div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input id="email" type="text" class="form-control" placeholder="name@example.com" />
        <div id="emailError" class="text-danger mt-1"></div>
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label">Phone</label>
        <input id="phone" type="text" class="form-control" placeholder="070-1234567" />
        <div id="phoneError" class="text-danger mt-1"></div>
      </div>

      <div class="mb-3">
        <label for="street" class="form-label">Street Address</label>
        <input id="street" type="text" class="form-control" placeholder="Address" />
        <div id="streetError" class="text-danger mt-1"></div>
      </div>

      <div class="row mb-3">
        <div class="col-sm-4">
          <label for="postcode" class="form-label">Postcode</label>
          <input id="postcode" type="text" class="form-control" placeholder="12345" />
          <div id="postcodeError" class="text-danger mt-1"></div>
        </div>
        <div class="col-sm-8">
          <label for="city" class="form-label">City</label>
          <input id="city" type="text" class="form-control" placeholder="City" />
          <div id="cityError" class="text-danger mt-1"></div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg">Place Order</button>

      <div id="successMessage" class="alert alert-success mt-4 d-none"></div>
    </form>
  </main>

  <script src="order.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
