<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Form</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="mb-3 text-center">Order Form</h1>
                        <p class="text-muted text-center mb-4">
                            Please fill in your details to place your order.
                        </p>

                        <form id="orderForm" novalidate>
                            <h2 class="h4 mb-3">Customer Information</h2>

                            <div class="mb-3">
                                <label for="name" class="form-label">Full Name</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="name"
                                    name="name"
                                    maxlength="50"
                                    placeholder="Name"
                                />
                                <div class="error-message text-danger mt-1" id="nameError"></div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input
                                    type="email"
                                    class="form-control"
                                    id="email"
                                    name="email"
                                    maxlength="50"
                                    placeholder="name@example.com"
                                />
                                <div class="error-message text-danger mt-1" id="emailError"></div>
                            </div>

                            <div class="mb-4">
                                <label for="phone" class="form-label">Phone Number</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="phone"
                                    name="phone"
                                    maxlength="20"
                                    placeholder="Example: 070-1234567"
                                />
                                <div class="error-message text-danger mt-1" id="phoneError"></div>
                            </div>

                            <h2 class="h4 mb-3">Delivery Address</h2>

                            <div class="mb-3">
                                <label for="street" class="form-label">Street Address</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="street"
                                    name="street"
                                    maxlength="50"
                                    placeholder="Address"
                                />
                                <div class="error-message text-danger mt-1" id="streetError"></div>
                            </div>

                            <div class="row">
                                <div class="col-12 col-md-4 mb-3">
                                    <label for="postcode" class="form-label">Post Code</label>
                                    <input
                                        type="text"
                                        class="form-control"
                                        id="postcode"
                                        name="postcode"
                                        maxlength="5"
                                        placeholder="12345"
                                    />
                                    <div class="error-message text-danger mt-1" id="postcodeError"></div>
                                </div>

                                <div class="col-12 col-md-8 mb-3">
                                    <label for="city" class="form-label">City</label>
                                    <input
                                        type="text"
                                        class="form-control"
                                        id="city"
                                        name="city"
                                        maxlength="20"
                                        placeholder="City"
                                    />
                                    <div class="error-message text-danger mt-1" id="cityError"></div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="product" class="form-label">Product</label>
                                <select class="form-select" id="product" name="product">
                                    <option value="">Choose a product</option>
                                    <option value="T-shirt">T-shirt</option>
                                    <option value="Hoodie">Hoodie</option>
                                    <option value="Mug">Mug</option>
                                </select>
                                <div class="error-message text-danger mt-1" id="productError"></div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Place Order
                                </button>
                            </div>

                            <div id="successMessage" class="alert alert-success mt-4 d-none">
                                Order submitted successfully!
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
